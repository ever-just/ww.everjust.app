name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  control-plane-tests:
    name: Control-plane tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Pin to exact commit SHAs to prevent supply-chain tag hijacking.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r control-plane/requirements.txt pytest
      - name: Run tests
        run: python -m pytest control-plane/tests -q

  branding-lint:
    name: Branding lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check for user-facing upstream branding leaks
        run: ./deployment/scripts/branding_lint.sh
