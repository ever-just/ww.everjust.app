<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}EVERJUST.APP — Run your business in one workspace{% endblock %}</title>
  <meta name="description" content="{% block description %}EVERJUST.APP gives your organization an isolated, fully-branded workspace — CRM, projects, documents, e-signatures, HR, payroll, calls and SMS in one place.{% endblock %}">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="light">

  <link rel="icon" href="/static/img/favicon.ico" sizes="any">
  <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="EVERJUST">

  <meta property="og:site_name" content="EVERJUST.APP">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ self.title() }}">
  <meta property="og:description" content="{{ self.description() }}">
  <meta property="og:image" content="https://{{ domain }}/static/img/icon-512x512.png">

  <link rel="stylesheet" href="/static/css/site.css">
  {% block head %}{% endblock %}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container">
      <a class="wordmark" href="/" aria-label="EVERJUST.APP home">
        <img src="/static/img/icon-192x192.png" alt="" width="26" height="26">
        EVERJUST.APP
      </a>
      <nav class="site-nav" aria-label="Main">
        {% block nav %}
        <a class="nav-link" href="/#features">Features</a>
        <a class="nav-link" href="/#pricing">Pricing</a>
        <a class="btn btn-ghost" href="/signin">Sign in</a>
        <a class="btn btn-primary" href="/signup">Get started</a>
        {% endblock %}
      </nav>
    </div>
  </header>

  <main id="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>&copy; {{ year }} EVERJUST.APP &mdash; All rights reserved.</span>
      <nav aria-label="Footer">
        <a href="/#features">Features</a>
        <a href="/#pricing">Pricing</a>
        <a href="/#faq">FAQ</a>
        <a href="/signin">Sign in</a>
        <a href="/signup">Get started</a>
        <a href="mailto:company@everjust.co">Contact</a>
      </nav>
    </div>
  </footer>

  <script src="/static/js/pwa.js" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
