[options]
; EVERJUST.APP — Odoo 19 multi-tenant configuration
addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo

db_host = db
db_port = 5432
db_user = everjust
db_password = ${POSTGRES_PASSWORD}

; ── Multi-tenancy ────────────────────────────────────────
; Route <subdomain>.everjust.app -> database named <subdomain>
dbfilter = ^%d$
; Lock down the database manager UI entirely (no public DB create/list)
list_db = False
db_name = False

; ── Proxy / SSL termination at Nginx ─────────────────────
proxy_mode = True

; ── Performance / scaling ────────────────────────────────
workers = 6
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; Master password for CLI provisioning only (UI manager disabled)
admin_passwd = ${ODOO_MASTER_PASSWORD}
