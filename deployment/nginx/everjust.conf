# EVERJUST.APP — Nginx reverse proxy
# Routes everjust.app (platform/signup) -> control plane
# Routes *.everjust.app (tenants)        -> Odoo (dbfilter picks DB by subdomain)

upstream everjust_odoo {
    server odoo:8069;
}
upstream everjust_odoo_longpolling {
    server odoo:8072;
}
upstream everjust_control {
    server control-plane:8000;
}

# ── Platform + signup (root domain) ──────────────────────
server {
    listen 443 ssl http2;
    server_name everjust.app www.everjust.app;

    ssl_certificate     /etc/letsencrypt/live/everjust.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/everjust.app/privkey.pem;

    location / {
        proxy_pass http://everjust_control;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Tenant instances (wildcard) ──────────────────────────
server {
    listen 443 ssl http2;
    server_name ~^(?<tenant>.+)\.everjust\.app$;

    ssl_certificate     /etc/letsencrypt/live/everjust.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/everjust.app/privkey.pem;

    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    client_max_body_size 200m;

    location /websocket {
        proxy_pass http://everjust_odoo_longpolling;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://everjust_odoo;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# ── HTTP -> HTTPS redirect ───────────────────────────────
server {
    listen 80;
    server_name everjust.app *.everjust.app;
    return 301 https://$host$request_uri;
}
