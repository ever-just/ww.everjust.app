name: Deploy to Production

on:
  push:
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/everjust/platform

            echo "=== Pulling latest code ==="
            sudo git config --global --add safe.directory /opt/everjust/platform
            sudo git fetch origin master
            sudo git reset --hard origin/master

            echo "=== Rebuilding control-plane ==="
            cd deployment
            sudo docker compose build --no-cache control-plane

            echo "=== Restarting services ==="
            sudo docker compose up -d --remove-orphans

            echo "=== Waiting for health check ==="
            for i in 1 2 3 4 5 6; do
              sleep 5
              if curl -sf http://localhost:8000/healthz > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              echo "Attempt $i: waiting for control-plane..."
            done
            echo "Health check failed after 30s"
            exit 1
