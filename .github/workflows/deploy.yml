name: Deploy to Production

on:
  push:
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/everjust/platform

            echo "=== Pulling latest code ==="
            sudo git config --global --add safe.directory /opt/everjust/platform
            sudo git fetch origin master
            sudo git reset --hard origin/master

            echo "=== Rebuilding control-plane ==="
            cd deployment
            sudo docker compose build --no-cache control-plane

            echo "=== Restarting services ==="
            sudo docker compose up -d --remove-orphans

            echo "=== Verifying deployment ==="
            sleep 5
            sudo docker compose exec -T control-plane python -c "import httpx; r = httpx.get('http://localhost:8000/healthz'); print(r.json()); assert r.status_code == 200" \
              || sudo docker compose exec -T control-plane python -c "from urllib.request import urlopen; import json; r = urlopen('http://localhost:8000/healthz'); print(json.loads(r.read())); assert r.status == 200"
            echo "=== Deploy complete ==="
